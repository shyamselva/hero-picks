<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Picks — Marvel &amp; DC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --marvel: #E23636; --dc: #0476D9; --gold: #FFD700; --bg: #0a0a0f; --surface: #12121a; --card: #1a1a28; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { text-align: center; margin-bottom: 1.5rem; }
  .header h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 4px; line-height: 1; background: linear-gradient(135deg, #E23636, #FFD700, #0476D9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header p { color: var(--muted); font-size: 1rem; margin-top: 0.4rem; }
  .header .creator { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 0.95rem; margin-top: 0.35rem; background: linear-gradient(90deg, #E23636, #FFD700, #0476D9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .hotw { border-radius: 14px; padding: 1.5rem; margin-bottom: 2rem; position: relative; overflow: hidden; }
  .hotw.marvel { background: linear-gradient(135deg, rgba(226,54,54,0.18) 0%, rgba(226,54,54,0.05) 100%); border: 1.5px solid rgba(226,54,54,0.4); }
  .hotw.dc { background: linear-gradient(135deg, rgba(4,118,217,0.18) 0%, rgba(4,118,217,0.05) 100%); border: 1.5px solid rgba(4,118,217,0.4); }
  .hotw-label { font-family: 'Bebas Neue', cursive; letter-spacing: 3px; font-size: 0.8rem; color: var(--gold); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
  .hotw-label::before, .hotw-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,215,0,0.3); }
  .hotw-inner { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .hotw-emoji { font-size: 4.5rem; line-height: 1; flex-shrink: 0; }
  .hotw-info { flex: 1; min-width: 180px; }
  .hotw-name { font-family: 'Bebas Neue', cursive; font-size: 2.4rem; letter-spacing: 3px; line-height: 1; }
  .hotw-alias { color: var(--muted); font-size: 0.9rem; margin: 0.2rem 0 0.5rem; }
  .hotw-teaser { font-size: 0.88rem; color: #bbb; line-height: 1.6; }
  .hotw-badge { display: inline-block; font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 0.75rem; padding: 0.15rem 0.7rem; border-radius: 4px; margin-bottom: 0.4rem; }
  .hotw-badge.marvel { background: rgba(226,54,54,0.2); color: var(--marvel); border: 1px solid var(--marvel); }
  .hotw-badge.dc { background: rgba(4,118,217,0.2); color: var(--dc); border: 1px solid var(--dc); }
  .hotw-btn { margin-top: 0.75rem; font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 1rem; padding: 0.45rem 1.2rem; border-radius: 6px; border: none; background: var(--gold); color: #111; cursor: pointer; transition: opacity 0.2s; }
  .hotw-btn:hover { opacity: 0.85; }
  .hotw-week { position: absolute; top: 1rem; right: 1rem; font-size: 0.72rem; color: var(--muted); letter-spacing: 1px; }
  .next-change { font-size: 0.75rem; color: var(--muted); margin-top: 0.6rem; }

  .filter-bar { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .filter-btn { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 1rem; padding: 0.4rem 1.2rem; border-radius: 4px; border: 2px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .filter-btn.active-all { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active-marvel { border-color: var(--marvel); color: var(--marvel); }
  .filter-btn.active-dc { border-color: var(--dc); color: var(--dc); }
  .search-bar { display: flex; justify-content: center; margin-bottom: 1.5rem; }
  .search-bar input { width: 100%; max-width: 400px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; padding: 0.55rem 1rem; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .search-bar input:focus { border-color: var(--gold); }
  .search-bar input::placeholder { color: var(--muted); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
  .hero-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.9rem 0.6rem; text-align: center; cursor: pointer; transition: transform 0.18s, border-color 0.18s; position: relative; overflow: hidden; }
  .hero-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.25); }
  .hero-card.marvel { --accent: var(--marvel); }
  .hero-card.dc { --accent: var(--dc); }
  .hero-card.selected { border-color: var(--gold) !important; box-shadow: 0 0 18px rgba(255,215,0,0.3); }
  .hero-card.hotw-card { border-color: var(--gold) !important; }
  .hero-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent); }
  .hotw-crown { position: absolute; top: 6px; right: 6px; font-size: 0.8rem; }
  .hero-emoji { font-size: 2.2rem; margin-bottom: 0.4rem; display: block; line-height: 1.2; }
  .hero-name { font-family: 'Bebas Neue', cursive; font-size: 0.95rem; letter-spacing: 1px; color: var(--text); line-height: 1.2; }
  .hero-universe { font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; margin-top: 0.2rem; color: var(--accent); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px; max-width: 560px; width: 100%; max-height: 90vh; overflow-y: auto; border: 2px solid var(--gold); position: relative; animation: popIn 0.25s ease-out; }
  @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-top { padding: 2rem 2rem 1rem; text-align: center; position: relative; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .hotw-indicator { font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 0.8rem; color: var(--gold); margin-bottom: 0.5rem; }
  .modal-hero-emoji { font-size: 4rem; display: block; margin-bottom: 0.5rem; }
  .modal-name { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; letter-spacing: 3px; }
  .modal-alias { font-size: 0.9rem; color: var(--muted); margin-top: 0.2rem; }
  .modal-badge { display: inline-block; font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 0.85rem; padding: 0.2rem 0.8rem; border-radius: 4px; margin-top: 0.5rem; }
  .modal-badge.marvel { background: rgba(226,54,54,0.2); color: var(--marvel); border: 1px solid var(--marvel); }
  .modal-badge.dc { background: rgba(4,118,217,0.2); color: var(--dc); border: 1px solid var(--dc); }
  .modal-body { padding: 0 1.5rem 1.5rem; }
  .section { margin-bottom: 1.2rem; }
  .section-title { font-family: 'Bebas Neue', cursive; font-size: 1.1rem; letter-spacing: 2px; color: var(--gold); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
  .section p { font-size: 0.92rem; line-height: 1.65; color: #ccc; }
  .facts-list { list-style: none; }
  .facts-list li { font-size: 0.88rem; color: #ccc; padding: 0.4rem 0; border-bottom: 1px solid var(--border); line-height: 1.5; display: flex; gap: 0.6rem; }
  .facts-list li::before { content: '★'; color: var(--gold); font-size: 0.75rem; flex-shrink: 0; margin-top: 0.1rem; }
  .fav-btn { width: 100%; margin-top: 1rem; padding: 0.7rem; font-family: 'Bebas Neue', cursive; letter-spacing: 2px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: var(--gold); color: #111; }
  .fav-btn:hover { opacity: 0.85; transform: scale(1.02); }
  .fav-btn.already { background: var(--surface); color: var(--gold); border: 2px solid var(--gold); }
  .favorites-section { margin-top: 2.5rem; }
  .favorites-section h2 { font-family: 'Bebas Neue', cursive; font-size: 1.8rem; letter-spacing: 3px; color: var(--gold); margin-bottom: 1rem; }
  .fav-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .fav-pill { background: var(--surface); border: 1.5px solid var(--gold); border-radius: 20px; padding: 0.3rem 0.8rem; font-size: 0.85rem; color: var(--gold); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem; }
  .fav-pill:hover { background: rgba(255,215,0,0.1); }
  .fav-pill .remove { color: var(--muted); font-size: 0.8rem; }
  .empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.95rem; grid-column: 1/-1; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Hero Picks</h1>
    <p>Choose your favourites from the Marvel &amp; DC universe</p>
    <p class="creator">🦸 A Damien Selva Creation</p>
  </div>
  <div id="hotw-container"></div>
  <div class="filter-bar">
    <button class="filter-btn active-all" onclick="setFilter('all', this)">All Heroes</button>
    <button class="filter-btn" onclick="setFilter('marvel', this)">Marvel</button>
    <button class="filter-btn" onclick="setFilter('dc', this)">DC</button>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search heroes..." oninput="renderGrid()" />
  </div>
  <div class="grid" id="grid"></div>
  <div class="favorites-section" id="fav-section" style="display:none;">
    <h2>⭐ My Favourites</h2>
    <div class="fav-grid" id="fav-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-top">
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
      <div class="hotw-indicator" id="m-hotw" style="display:none;">★ Hero of the Week ★</div>
      <span class="modal-hero-emoji" id="m-emoji"></span>
      <div class="modal-name" id="m-name"></div>
      <div class="modal-alias" id="m-alias"></div>
      <span class="modal-badge" id="m-badge"></span>
    </div>
    <div class="modal-body">
      <div class="section"><div class="section-title">Origin Story</div><p id="m-origin"></p></div>
      <div class="section"><div class="section-title">Powers &amp; Abilities</div><p id="m-powers"></p></div>
      <div class="section"><div class="section-title">Fun Facts</div><ul class="facts-list" id="m-facts"></ul></div>
      <button class="fav-btn" id="fav-btn" onclick="toggleFav()"></button>
    </div>
  </div>
</div>

<script>
const heroes = [
  { id: 1, name: "Spider-Man", alias: "Peter Parker", universe: "marvel", emoji: "🕷️", origin: "Bitten by a radioactive spider during a high school field trip, Peter Parker gained superhuman strength, agility, and the ability to cling to walls. After failing to stop a thief who later killed his Uncle Ben, he adopted the mantra: 'With great power comes great responsibility.'", powers: "Wall-crawling, spider-sense (precognitive danger detection), superhuman strength (can lift 10+ tons), agility, and web-shooting via self-made web-shooters.", facts: ["Created by Stan Lee and Steve Ditko in 1962", "His web-shooters are his own invention — he's a genius-level chemist", "Has been a member of the Avengers, Fantastic Four, and the X-Men", "There are over 50 alternate Spider-Men across the multiverse"] },
  { id: 2, name: "Iron Man", alias: "Tony Stark", universe: "marvel", emoji: "🦾", origin: "Billionaire weapons manufacturer Tony Stark was captured by terrorists and forced to build a weapon. Instead, he secretly built a powered suit of armour to escape. He refined it into the Mark series of Iron Man suits, dedicating himself to protecting the world.", powers: "Genius-level intellect (IQ 270+), powered armour granting flight, repulsor beams, superhuman strength, energy weapons, and an AI assistant (J.A.R.V.I.S./F.R.I.D.A.Y.).", facts: ["Tony was inspired in part by Howard Hughes", "The first Iron Man suit weighed over 90 pounds", "He is fluent in multiple languages and a master engineer", "His arc reactor technology can power a city block for a year"] },
  { id: 3, name: "Thor", alias: "Thor Odinson", universe: "marvel", emoji: "⚡", origin: "Born the son of Odin, king of Asgard, Thor was banished to Earth after acting arrogantly. Only by proving himself worthy could he lift his enchanted hammer Mjolnir. He eventually regained his powers and became one of Earth's mightiest heroes.", powers: "Asgardian physiology granting superhuman strength, durability, and longevity. Mjolnir grants flight, weather manipulation, and lightning control. Also wields Stormbreaker.", facts: ["Thor debuted in Journey into Mystery #83 in 1962", "He is over 1,500 years old", "Several others have been deemed worthy to lift Mjolnir, including Captain America", "His half-brother Loki is his most recurring villain"] },
  { id: 4, name: "Captain America", alias: "Steve Rogers", universe: "marvel", emoji: "🛡️", origin: "A frail young man from Brooklyn, Steve Rogers was deemed unfit for WWII military service but volunteered for a secret Super Soldier programme. Injected with the Super Soldier Serum and bombarded with Vita-Rays, he became a perfect physical specimen.", powers: "Enhanced strength, speed, endurance, agility, and healing factor. His vibranium shield can absorb any impact and be used as a devastating weapon.", facts: ["Steve was frozen in ice for approximately 70 years", "His shield is made of a vibranium-steel alloy — completely unique", "He has led the Avengers more times than anyone else", "He was the first superhero to appear on the cover of a US comic in 1941"] },
  { id: 5, name: "Black Widow", alias: "Natasha Romanoff", universe: "marvel", emoji: "🕸️", origin: "Trained from childhood in the Red Room, a covert Soviet programme, Natasha Romanoff became the world's greatest espionage operative. She later defected and joined S.H.I.E.L.D., becoming a founding Avenger.", powers: "Master martial artist, acrobat, and spy. Uses Widow's Bite electroshock wrist devices. Slowed ageing due to Red Room biotech enhancements. Speaks dozens of languages.", facts: ["She has had over 30 aliases across her career", "Her red ledger — referring to past actions — is a recurring theme", "She was once brainwashed to believe she was a ballerina", "Her real age is ambiguous, but she may be over 80"] },
  { id: 6, name: "Hulk", alias: "Bruce Banner", universe: "marvel", emoji: "💚", origin: "Physicist Dr. Bruce Banner was caught in the blast of a gamma bomb he designed, absorbing a massive dose of gamma radiation. The trauma caused him to transform into the Hulk — a massive green creature that embodies his repressed rage.", powers: "The madder Hulk gets, the stronger he gets — potentially limitless strength. Near-invulnerability, extreme healing factor, and thunderclap capable of levelling buildings.", facts: ["Hulk was originally grey in his first appearance — a printing error made him green", "He can jump into Earth orbit unaided", "Banner holds seven PhDs", "Professor Hulk merges Banner's mind with Hulk's body for perfect control"] },
  { id: 7, name: "Black Panther", alias: "T'Challa", universe: "marvel", emoji: "🐾", origin: "As king of the technologically advanced African nation of Wakanda, T'Challa consumes the heart-shaped herb during a sacred ritual to receive the power of the Black Panther — protector of his people for generations.", powers: "Enhanced strength, speed, and senses from the heart-shaped herb. Vibranium suit that absorbs kinetic energy and returns it as force. Genius-level intellect and master combatant.", facts: ["Black Panther was the first Black superhero in mainstream American comics (1966)", "Wakanda is the world's only source of vibranium", "He is one of the eight smartest people on Earth in the Marvel universe", "He has briefly held the Power Stone"] },
  { id: 8, name: "Doctor Strange", alias: "Stephen Strange", universe: "marvel", emoji: "🔮", origin: "Brilliant but arrogant neurosurgeon Dr. Stephen Strange suffered nerve damage in a car accident, ending his career. Seeking a cure, he found the Ancient One in Nepal and became Earth's Sorcerer Supreme after years of magical training.", powers: "Master of the mystic arts: astral projection, time manipulation via the Eye of Agamotto, dimension-hopping, energy shields, and powerful spells.", facts: ["Strange has memorised the entirety of Kamar-Taj's library", "His Cloak of Levitation is semi-sentient and chooses its wearer", "He once spent 14,000,605 alternate timelines looking for a way to beat Thanos", "He beat Dormammu by trapping him in a time loop"] },
  { id: 9, name: "Wolverine", alias: "James Logan Howlett", universe: "marvel", emoji: "🦴", origin: "Born in the 1880s, James Howlett discovered he had a mutant healing factor and retractable bone claws. His claws were later coated with indestructible adamantium metal in the Weapon X programme.", powers: "Indestructible adamantium skeleton and claws, superhuman healing factor (can regrow organs), heightened senses, and over 130 years of combat experience.", facts: ["Wolverine is over 140 years old", "His adamantium skeleton weighs more than a normal person's entire body", "He has been a samurai, a secret agent, and a teacher", "He is one of very few characters who can remember the original Marvel timeline"] },
  { id: 10, name: "Captain Marvel", alias: "Carol Danvers", universe: "marvel", emoji: "🌟", origin: "Air Force pilot Carol Danvers absorbed energy from a Kree device during an explosion, rewriting her DNA and granting her incredible powers. She later discovered her Kree heritage before reclaiming her identity as Captain Marvel.", powers: "Binary form grants flight at near light speed, energy projection, superhuman strength, and immunity to most toxins. One of the physically strongest heroes in the universe.", facts: ["She can survive and fly unaided in deep space", "Her Binary power is fuelled by a white hole", "She was an ace pilot before gaining powers", "Nick Fury contacted her via a modified pager at the end of Infinity War"] },
  { id: 11, name: "Scarlet Witch", alias: "Wanda Maximoff", universe: "marvel", emoji: "🔴", origin: "Born in Sokovia, Wanda was experimented on by HYDRA using the Mind Stone, one of the Infinity Stones. This awakened her latent mutant abilities, turning her into a powerful chaos magic wielder.", powers: "Chaos magic, reality warping, telepathy, telekinesis, hex bolts, and probability manipulation. One of the most powerful beings in the multiverse.", facts: ["She rewrote reality to create an entire world called House of M", "Her powers are fuelled by emotional states", "In some stories she is Magneto's daughter", "She has been an Avenger, a villain, and everything in between"] },
  { id: 12, name: "Ant-Man", alias: "Scott Lang", universe: "marvel", emoji: "🐜", origin: "Scott Lang was a thief who broke into the home of scientist Hank Pym and stole the Ant-Man suit to save his daughter. Pym, recognising Scott's potential, mentored him as the new Ant-Man.", powers: "Pym Particles allow size reduction to ant size while retaining full strength. Can grow to enormous size as Giant-Man. Communicates with ants via a cybernetic helmet.", facts: ["Scott can shrink to the Quantum Realm — smaller than atoms", "In Giant-Man form he can reach 65 feet tall", "He once crawled inside Iron Man's suit to short-circuit it from inside", "His daughter Cassie later becomes the hero Stature"] },
  { id: 13, name: "Hawkeye", alias: "Clint Barton", universe: "marvel", emoji: "🏹", origin: "Abandoned as a child and raised in a circus, Clint Barton mastered archery. He initially operated as a villain before being inspired by Iron Man to become a hero.", powers: "No superhuman powers. The world's greatest marksman. Uses a vast array of trick arrows: explosive, EMP, sonic, and more.", facts: ["He is profoundly deaf in many stories and uses hearing aids", "He can hit targets without looking", "He trained the West Coast Avengers and the New Warriors", "He once beat Thanos with a regular arrow at close range"] },
  { id: 14, name: "Falcon", alias: "Sam Wilson", universe: "marvel", emoji: "🦅", origin: "Sam Wilson, a former military pararescueman, was equipped by Captain America with a special EXO-7 Falcon winged harness. He became one of Cap's closest allies and eventually took up the Captain America mantle.", powers: "EXO-7 Falcon suit grants flight via retractable metal wings. Uses drones called Redwing. Expert combatant. As Captain America, wields the vibranium shield.", facts: ["Sam can see through Redwing's eyes in real time", "He was the first Black Captain America in the main Marvel timeline", "He shares a mental link with birds", "He turned down the Captain America title twice before accepting"] },
  { id: 15, name: "War Machine", alias: "James Rhodes", universe: "marvel", emoji: "🤖", origin: "Colonel James Rhodes was Tony Stark's best friend and US Air Force liaison. When Stark was incapacitated, Rhodes donned the Iron Man armour. Tony later built him a customised heavy-weapons variant called War Machine.", powers: "Heavily armoured suit with shoulder mini-gun, missile launchers, repulsors, and unibeam. Military training and combat experience supplements the tech.", facts: ["Rhodey is a licensed military pilot and decorated veteran", "The War Machine armour weighs approximately 20 tons", "He was temporarily paralysed but later restored", "He has been an Avenger and a member of the Iron Patriot programme"] },
  { id: 16, name: "Vision", alias: "Vision", universe: "marvel", emoji: "💎", origin: "Created by Ultron and powered by the Mind Stone, Vision was intended as a weapon. However, he immediately sided with the Avengers, developing humanity and feelings of his own.", powers: "Density manipulation (can become intangible or diamond-hard), flight, energy projection from the Mind Stone, and computer-level intellect.", facts: ["He can phase his hand through a person's chest, solidify it, and remove it", "He was briefly married to Scarlet Witch in their own suburban reality", "He once killed a man and felt genuine remorse", "After the Mind Stone was removed, a reconstructed version called White Vision exists"] },
  { id: 17, name: "Nick Fury", alias: "Nicholas J. Fury", universe: "marvel", emoji: "🕶️", origin: "A decorated WWII soldier who survived thanks to the Infinity Formula slowing his ageing, Nick Fury founded and led S.H.I.E.L.D. for decades, orchestrating global defence against superhuman threats.", powers: "No superhuman powers. Tactical mastermind, expert spy, and hand-to-hand combatant. His left eye was damaged in an explosion and covered by his iconic eyepatch.", facts: ["He personally assembled the original Avengers initiative", "He faked his own death at least three times", "He has operated as a spy since WWII — over 70 years", "He has a secret son, Nick Fury Jr."] },
  { id: 18, name: "Deadpool", alias: "Wade Wilson", universe: "marvel", emoji: "💬", origin: "Ex-Special Forces mercenary Wade Wilson was diagnosed with terminal cancer and enrolled in the Weapon X programme. Experimental procedures gave him a powerful healing factor — but left his skin horribly scarred.", powers: "Unkillable healing factor (can regrow limbs), peak human strength and agility, expert marksman and swordsman. He is also fully aware he is a fictional character!", facts: ["He is aware he lives in a fictional universe", "He once killed the entire Marvel universe — twice — in his own comics", "His healing factor and cancer are in constant battle, causing his scarring", "He is best friends with Spider-Man and loves Captain America"] },

function getISOWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function getNextMonday() {
  const now = new Date();
  const day = now.getDay();
  const daysUntilMonday = day === 0 ? 1 : 8 - day;
  const next = new Date(now);
  next.setDate(now.getDate() + daysUntilMonday);
  return next.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
}

const now = new Date();
const week = getISOWeek(now);
const seed = now.getFullYear() * 100 + week;
const hotwHero = heroes[seed % heroes.length];

function renderHoTW() {
  const c = document.getElementById('hotw-container');
  c.innerHTML = `
    <div class="hotw ${hotwHero.universe}">
      <div class="hotw-week">Week ${week}</div>
      <div class="hotw-label">★ Hero of the Week ★</div>
      <div class="hotw-inner">
        <div class="hotw-emoji">${hotwHero.emoji}</div>
        <div class="hotw-info">
          <span class="hotw-badge ${hotwHero.universe}">${hotwHero.universe.toUpperCase()}</span>
          <div class="hotw-name">${hotwHero.name}</div>
          <div class="hotw-alias">${hotwHero.alias}</div>
          <div class="hotw-teaser">${hotwHero.origin.slice(0, 120)}...</div>
          <button class="hotw-btn" onclick="openModal(${hotwHero.id})">View Full Profile</button>
          <div class="next-change">Changes automatically on Monday · Next: ${getNextMonday()}</div>
        </div>
      </div>
    </div>`;
}

let currentFilter = 'all';
let favorites = [];
let selectedHero = null;

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
  btn.className = 'filter-btn active-' + f;
  renderGrid();
}

function renderGrid() {
  const search = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = heroes.filter(h => {
    const matchF = currentFilter === 'all' || h.universe === currentFilter;
    const matchS = h.name.toLowerCase().includes(search) || h.alias.toLowerCase().includes(search);
    return matchF && matchS;
  });
  if (!filtered.length) { grid.innerHTML = '<div class="empty">No heroes found. Try a different search!</div>'; return; }
  grid.innerHTML = filtered.map(h => `
    <div class="hero-card ${h.universe} ${favorites.includes(h.id) ? 'selected' : ''} ${h.id === hotwHero.id ? 'hotw-card' : ''}" onclick="openModal(${h.id})">
      ${h.id === hotwHero.id ? '<span class="hotw-crown">👑</span>' : ''}
      <span class="hero-emoji">${h.emoji}</span>
      <div class="hero-name">${h.name}</div>
      <div class="hero-universe">${h.universe.toUpperCase()}</div>
    </div>`).join('');
}

function openModal(id) {
  const h = heroes.find(x => x.id === id);
  selectedHero = h;
  document.getElementById('m-emoji').textContent = h.emoji;
  document.getElementById('m-name').textContent = h.name;
  document.getElementById('m-alias').textContent = h.alias;
  const badge = document.getElementById('m-badge');
  badge.textContent = h.universe.toUpperCase();
  badge.className = 'modal-badge ' + h.universe;
  document.getElementById('m-origin').textContent = h.origin;
  document.getElementById('m-powers').textContent = h.powers;
  document.getElementById('m-facts').innerHTML = h.facts.map(f => `<li>${f}</li>`).join('');
  document.getElementById('m-hotw').style.display = h.id === hotwHero.id ? 'block' : 'none';
  updateFavBtn();
  document.getElementById('modal').classList.add('open');
}

function updateFavBtn() {
  const btn = document.getElementById('fav-btn');
  if (favorites.includes(selectedHero.id)) {
    btn.textContent = '★ Remove from favourites';
    btn.className = 'fav-btn already';
  } else {
    btn.textContent = '☆ Add to favourites';
    btn.className = 'fav-btn';
  }
}

function toggleFav() {
  if (!selectedHero) return;
  favorites = favorites.includes(selectedHero.id)
    ? favorites.filter(x => x !== selectedHero.id)
    : [...favorites, selectedHero.id];
  updateFavBtn();
  renderGrid();
  renderFavs();
}

function renderFavs() {
  const section = document.getElementById('fav-section');
  const grid = document.getElementById('fav-grid');
  if (!favorites.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  grid.innerHTML = favorites.map(id => {
    const h = heroes.find(x => x.id === id);
    return `<div class="fav-pill" onclick="openModal(${h.id})">${h.emoji} ${h.name} <span class="remove" onclick="event.stopPropagation();removeFav(${h.id})">✕</span></div>`;
  }).join('');
}

function removeFav(id) {
  favorites = favorites.filter(x => x !== id);
  renderGrid();
  renderFavs();
}

function closeModal(e) { if (e.target.id === 'modal') closeModalBtn(); }
function closeModalBtn() { document.getElementById('modal').classList.remove('open'); }

renderHoTW();
renderGrid();
</script>
